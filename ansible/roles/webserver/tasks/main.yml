---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install Nginx and Git
  apt:
    name:
      - nginx
      - git
    state: present

- name: Ensure Nginx is started and enabled
  systemd:
    name: nginx
    state: started
    enabled: yes

- name: Remove default nginx index page
  file:
    path: /var/www/html/index.nginx-debian.html
    state: absent

- name: Deploy game code from local repository
  copy:
    src: ../../../website/
    dest: /var/www/html/
    owner: www-data
    group: www-data
    mode: '0644'
  notify: restart nginx
