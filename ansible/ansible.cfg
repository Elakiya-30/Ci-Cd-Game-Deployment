[defaults]
inventory = ./aws_ec2.yml
host_key_checking = False
roles_path = ./roles
remote_user = ubuntu

[ssh_connection]
# Use AWS SSM to connect to private EC2 instances without opening SSH ports or using Bastion
ssh_args = -o ProxyCommand="sh -c \"aws ssm start-session --target %h --document-name AWS-StartSSHSession --parameters 'portNumber=%p'\""
